name: Run Integral Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:

jobs:
  integral-tests:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Cache Docker layers
      uses: actions/cache@v3
      with:
        path: /tmp/.buildx-cache
        key: ${{ runner.os }}-buildx-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-buildx-
    
    - name: Build and run integral tests
      run: |
        docker compose -f compose.test.yml build
        docker compose -f compose.test.yml up \
          --abort-on-container-exit \
          --exit-code-from users-integral-tests \
          --force-recreate --remove-orphans \
          users-test-db users-integral-tests
      env:
        DATABASE_URL: postgresql+asyncpg://postgres:postgres@users-test-db:5432/melodia_test

    - name: Copy coverage report from container
      if: always()
      run: |
        mkdir -p coverage_reports
        docker cp users-integral-tests:/app/coverage_reports/coverage.xml coverage_reports/coverage.xml || echo "No coverage file found"

    - name: Upload coverage to Codecov
      if: always()
      uses: codecov/codecov-action@v5
      with:
        files: coverage_reports/coverage.xml
        flags: integral-tests
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: true

    - name: Upload test logs on failure
      if: ${{ failure() }}
      uses: actions/upload-artifact@v4 
      with:
        name: test-logs
        path: |
          **/test-results/**/*
          **/logs/**/*
        retention-days: 5

    - name: Cleanup Docker containers and volumes
      if: always()
      run: |
        docker compose -f compose.test.yml down -v --remove-orphans || true

    - name: Fix permissions for cleanup
      if: always()
      run: |
        sudo chown -R $USER:$USER . || true
        sudo rm -rf .pytest_cache __pycache__ **/__pycache__ **/.pytest_cache || true
