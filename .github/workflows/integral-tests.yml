name: Run Integral Tests

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  integral-tests:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Cache Docker layers
      uses: actions/cache@v3
      with:
        path: /tmp/.buildx-cache
        key: ${{ runner.os }}-buildx-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-buildx-
    
    - name: Build and run integral tests
      run: |
        docker compose -f compose.test.yml build
        docker compose -f compose.test.yml up \
          --abort-on-container-exit \
          --exit-code-from users-integral-tests \
          users-test-db users-integral-tests
      env:
        DATABASE_URL: postgresql+asyncpg://postgres:postgres@users-test-db:5432/melodia_test
    
    - name: Upload test logs on failure
      if: ${{ failure() }}
      uses: actions/upload-artifact@v4 
      with:
        name: test-logs
        path: |
          **/test-results/**/*
          **/logs/**/*
        retention-days: 5
