
name: Build and Deploy to Cloud Run

on:
  push:
    branches: [ main ]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT }}
  REGION: ${{ secrets.GCP_REGION }}
  ARTIFACT_REPO: ${{ secrets.ARTIFACT_REGISTRY_REPO }}
  IMAGE_NAME: ${{ secrets.IMAGE_NAME }}

jobs:
  build-and-deploy:
    runs-on:
      group: Cloud-deploy-runners
      labels: deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP (service account key)
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Install gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT }}
          version: "latest"

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${REGION}-docker.pkg.dev -q

      - name: Build, tag and push image (runner)
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT }}
          REGION: ${{ secrets.GCP_REGION }}
          ARTIFACT_REPO: ${{ secrets.ARTIFACT_REGISTRY_REPO }} 
          IMAGE_NAME: ${{ secrets.IMAGE_NAME }}
        run: |
          # Validaciones rápidas
          if [ -z "${ARTIFACT_REPO}" ]; then
            echo "ERROR: ARTIFACT_REPO is empty. Check the secret name in the workflow."
            exit 1
          fi
          # Construir tag
          IMAGE_URI_SHA="${REGION}-docker.pkg.dev/${PROJECT_ID}/${ARTIFACT_REPO}/${IMAGE_NAME}:${GITHUB_SHA}"
          IMAGE_URI_LATEST="${REGION}-docker.pkg.dev/${PROJECT_ID}/${ARTIFACT_REPO}/${IMAGE_NAME}:latest"

          echo "Building ${IMAGE_URI_SHA} ..."
          docker build --target dev -t "${IMAGE_URI_SHA}" .

          echo "Tagging latest..."
          docker tag "${IMAGE_URI_SHA}" "${IMAGE_URI_LATEST}"

          echo "Pushing SHA..."
          docker push "${IMAGE_URI_SHA}"

          echo "Pushing latest..."
          docker push "${IMAGE_URI_LATEST}"

          # exportar para pasos siguientes si los necesitás
          echo "IMAGE_URI_SHA=${IMAGE_URI_SHA}" >> $GITHUB_ENV
          echo "IMAGE_URI_LATEST=${IMAGE_URI_LATEST}" >> $GITHUB_ENV

      - name: Deploy to Cloud Run (use SHA-tag)
        run: |
          echo "Deploying image: $IMAGE_URI_SHA"
          # asegurate de usar una sola invocación de gcloud run deploy
          gcloud run deploy "${IMAGE_NAME}" \
            --image "${IMAGE_URI_SHA}" \
            --region "${REGION}" \
            --platform managed \
            --timeout 600s \
            --allow-unauthenticated \
            --set-env-vars "CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }},CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }},CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }},CLOUDINARY_URL=${{ secrets.CLOUDINARY_URL }},DATABASE_HOST=${{ secrets.DATABASE_HOST }},DATABASE_NAME=${{ secrets.DATABASE_NAME }},DATABASE_USER=${{ secrets.DATABASE_USER }},DATABASE_PASSWORD=${{ secrets.DATABASE_PASSWORD }},DATABASE_PORT=${{ secrets.DATABASE_PORT }},ENVIRONMENT=production,AUTH_SECRET=${{ secrets.AUTH_SECRET }},SEARCH_SERVICE_URL=${{ secrets.SEARCH_SERVICE_URL }}" \
            --project "${PROJECT_ID}"
