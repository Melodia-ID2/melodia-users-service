name: CI - tests

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16.3-bookworm
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: melodia
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d melodia -h localhost"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            python -m pip install --upgrade pip
            pip install -r requirements.txt
          fi
      
      - name: Run linting and formatting checks
        run: |
          ruff check .
          ruff format . --check

      - name: Wait for Postgres
        run: |
          for i in $(seq 1 30); do
            pg_isready -h localhost -p 5432 -U postgres && break
            sleep 1
          done

      - name: Export DB env
        run: echo "DATABASE_URL=postgresql+psycopg2://postgres:postgres@localhost:5432/melodia" >> $GITHUB_ENV

      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          if [ -d tests/unit ]; then
            pytest -c pytest.ini tests/unit -v --cov=app --cov-report=term-missing || (echo "Users tests failed" && exit 1)
          else
            echo "No unit tests found"
          fi