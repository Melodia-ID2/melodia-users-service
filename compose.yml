services:
  db:
    image: postgres:16.3-bookworm
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "${DATABASE_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME} -h localhost || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - melodia-net

  users:
    build: .
    container_name: users-service
    env_file: .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - PORT=8002
    ports:
      - "8002:8002"
    depends_on:
      - db
    networks:
      - melodia-net

volumes:
  db-data:

networks:
  melodia-net:
    driver: bridge